baseURL = "https://strugglinghistorian.me/"
locale  = "en-us"
title   = "The Struggling Historian"
theme   = "PaperMod"
paginate      = 10
enableRobotsTXT = true
buildDrafts   = false
buildFuture   = false
buildExpired  = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  author = "Namkat Cedrick"
  description = "A software engineer's obsession with history — event-driven systems, developer tooling, African history, and the patterns that connect them all."
  defaultTheme      = "auto"
  disableThemeToggle = false
  ShowReadingTime   = true
  ShowShareButtons  = false
  ShowPostNavLinks  = true
  ShowBreadCrumbs   = true
  ShowCodeCopyButtons = true
  ShowWordCount     = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc        = true
  disableScrollToTop = false
  comments   = false
  hidemeta   = false
  hideSummary = false
  showtoc    = true
  tocopen    = false
  mainSections = ["posts"]

  [params.homeInfoParams]
    Title   = "The Struggling Historian"
    Content = "An engineer who keeps getting distracted by the past. I build event-driven systems and developer toolchains by day — and write about African history, colonial memory, and the origins of the things we take for granted by night. Because tech and history are not as separate as people think. Written by **Namkat Cedrick**, software engineer from Cameroon."

  [[params.socialIcons]]
    name = "github"
    url  = "https://github.com/namkatcedrickjumtock"

  [[params.socialIcons]]
    name = "linkedin"
    url  = "https://www.linkedin.com/in/namkatcedrick/"

  [[params.socialIcons]]
    name = "sessionize"
    url  = "https://sessionize.com/cedrick/"

  [[params.socialIcons]]
    name = "email"
    url  = "mailto:cedrickjumtock+dev01@gmail.com"

  [params.cover]
    hidden         = false
    hiddenInList   = false
    hiddenInSingle = false
    responsiveImages = true

[taxonomies]
  category = "categories"
  tag      = "tags"
  series   = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences    = true
    guessSyntax   = true
    lineNos       = true
    style         = "dracula"
    tabWidth      = 2
  [markup.tableOfContents]
    endLevel   = 4
    ordered    = false
    startLevel = 2

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name       = "Posts"
    url        = "/posts/"
    weight     = 10
  [[menu.main]]
    identifier = "tags"
    name       = "Tags"
    url        = "/tags/"
    weight     = 20
  [[menu.main]]
    identifier = "categories"
    name       = "Categories"
    url        = "/categories/"
    weight     = 30
  [[menu.main]]
    identifier = "about"
    name       = "About"
    url        = "/about/"
    weight     = 40
  [[menu.main]]
    identifier = "search"
    name       = "Search"
    url        = "/search/"
    weight     = 50
