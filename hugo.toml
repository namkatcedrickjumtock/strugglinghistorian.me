baseURL = "https://strugglinghistorian.me/"
locale  = "en-us"
title   = "The Struggling Historian"
theme   = "PaperMod"
paginate      = 10
enableRobotsTXT = true
buildDrafts   = false
buildFuture   = false
buildExpired  = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  author = "Namkat Cedrick"
  description = "A software engineer's obsession with history — event-driven systems, developer tooling, African history, and the patterns that connect them all."
  defaultTheme      = "dark"
  disableThemeToggle = false
  ShowReadingTime   = true
  ShowShareButtons  = false
  ShowPostNavLinks  = true
  ShowBreadCrumbs   = true
  ShowCodeCopyButtons = true
  ShowWordCount     = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc        = true
  disableScrollToTop = false
  comments   = false
  hidemeta   = false
  hideSummary = false
  showtoc    = true
  tocopen    = false
  mainSections = ["posts"]

  [params.homeInfoParams]
    Title   = "The Struggling Historian"
    Content = "**Software engineer from Cameroon** — building event-driven systems and developer toolchains with an AI-first mindset.\n\nBut I'm also hopelessly obsessed with history. The patterns that repeat, the empires that left systems we're still debugging, the stories that never made the textbook.\n\nSo I write about tech. I write about history. And I try to show they're not as separate as people think.\n\n*Welcome to the struggle.*"

  [[params.socialIcons]]
    name = "github"
    url  = "https://github.com/namkatcedrickjumtock"

  [[params.socialIcons]]
    name = "linkedin"
    url  = "https://www.linkedin.com/in/namkatcedrick/"

  [[params.socialIcons]]
    name = "sessionize"
    url  = "https://sessionize.com/cedrick/"

  [[params.socialIcons]]
    name = "email"
    url  = "mailto:cedrickjumtock+dev01@gmail.com"

  [params.cover]
    hidden         = false
    hiddenInList   = false
    hiddenInSingle = false
    responsiveImages = true

[taxonomies]
  category = "categories"
  tag      = "tags"
  series   = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences    = true
    guessSyntax   = true
    lineNos       = true
    style         = "dracula"
    tabWidth      = 2
  [markup.tableOfContents]
    endLevel   = 4
    ordered    = false
    startLevel = 2

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name       = "Posts"
    url        = "/posts/"
    weight     = 10
  [[menu.main]]
    identifier = "talks"
    name       = "Talks"
    url        = "/talks/"
    weight     = 15
  [[menu.main]]
    identifier = "tags"
    name       = "Tags"
    url        = "/tags/"
    weight     = 20
  [[menu.main]]
    identifier = "categories"
    name       = "Categories"
    url        = "/categories/"
    weight     = 30
  [[menu.main]]
    identifier = "about"
    name       = "About"
    url        = "/about/"
    weight     = 40
  [[menu.main]]
    identifier = "search"
    name       = "Search"
    url        = "/search/"
    weight     = 50
