baseURL = "https://strugglinghistorian.me/"
locale  = "en-us"
title   = "The Struggling Historian"
theme   = "PaperMod"
paginate      = 10
enableRobotsTXT = true
buildDrafts   = false
buildFuture   = false
buildExpired  = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  author = "Namkat Cedrick"
  description = "Software engineer from Cameroon writing about distributed systems, developer toolchains, and AI-first engineering. History enthusiast. Mostly tech. Quietly curious."
  defaultTheme      = "dark"
  disableThemeToggle = false
  ShowReadingTime   = true
  ShowShareButtons  = false
  ShowPostNavLinks  = true
  ShowBreadCrumbs   = true
  ShowCodeCopyButtons = true
  ShowWordCount     = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc        = true
  disableScrollToTop = false
  comments   = false
  hidemeta   = false
  hideSummary = false
  showtoc    = true
  tocopen    = false
  mainSections = ["posts"]

  [params.label]
    text      = "The Struggling Historian"
    iconSVG   = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="12,3 13.5,10.5 12,12 10.5,10.5" fill="currentColor" stroke="none"/><polygon points="21,12 13.5,13.5 12,12 13.5,10.5" fill="currentColor" stroke="none" opacity="0.5"/><polygon points="12,21 10.5,13.5 12,12 13.5,13.5" fill="currentColor" stroke="none" opacity="0.5"/><polygon points="3,12 10.5,10.5 12,12 10.5,13.5" fill="currentColor" stroke="none" opacity="0.8"/><text x="12" y="7.5" text-anchor="middle" font-size="2.5" font-family="serif" fill="currentColor" stroke="none">N</text></svg>'

  [params.homeInfoParams]
    Title   = "The Struggling Historian"
    Content = "**Software engineer from Cameroon.** I build distributed systems and developer toolchains — event-driven architecture, AI-first tooling, and the infrastructure that makes engineering teams faster.\n\nI also have an embarrassing obsession with history. The patterns, the empires, the systems that fell and the ones that didn't.\n\nThis is my writing. Mostly tech. Quietly curious."

  [[params.socialIcons]]
    name = "github"
    url  = "https://github.com/namkatcedrickjumtock"

  [[params.socialIcons]]
    name = "linkedin"
    url  = "https://www.linkedin.com/in/namkatcedrick/"

  [[params.socialIcons]]
    name = "sessionize"
    url  = "https://sessionize.com/cedrick/"

  [[params.socialIcons]]
    name = "email"
    url  = "mailto:cedrickjumtock+dev01@gmail.com"

  [params.cover]
    hidden         = false
    hiddenInList   = false
    hiddenInSingle = false
    responsiveImages = true

[taxonomies]
  category = "categories"
  tag      = "tags"
  series   = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences    = true
    guessSyntax   = true
    lineNos       = true
    style         = "dracula"
    tabWidth      = 2
  [markup.tableOfContents]
    endLevel   = 4
    ordered    = false
    startLevel = 2

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name       = "Posts"
    url        = "/posts/"
    weight     = 10
  [[menu.main]]
    identifier = "talks"
    name       = "Talks"
    url        = "/talks/"
    weight     = 15
  [[menu.main]]
    identifier = "search"
    name       = "Search"
    url        = "/search/"
    weight     = 50
