{{- if .IsHome }}
<meta property="og:image" content="{{ "/images/sketch.png" | absURL }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:title" content="{{ site.Title }}">
<meta property="og:description" content="{{ site.Params.description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ site.BaseURL }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ "/images/sketch.png" | absURL }}">
{{- end }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
