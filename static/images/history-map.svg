<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 330" width="260" height="330">
  <defs>
    <filter id="paper" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Parchment background -->
  <rect width="260" height="330" fill="#EDD98A" rx="2"/>
  <rect width="260" height="330" fill="#F4E8B0" rx="2" filter="url(#paper)" opacity="0.6"/>

  <!-- Decorative double border -->
  <rect x="5" y="5" width="250" height="320" fill="none" stroke="#8B6914" stroke-width="2.5" rx="1"/>
  <rect x="9" y="9" width="242" height="312" fill="none" stroke="#A07820" stroke-width="0.8" rx="1"/>

  <!-- Corner ornaments -->
  <g fill="#8B6914">
    <circle cx="9" cy="9" r="3.5"/><circle cx="9" cy="9" r="1.5" fill="#EDD98A"/>
    <circle cx="251" cy="9" r="3.5"/><circle cx="251" cy="9" r="1.5" fill="#EDD98A"/>
    <circle cx="9" cy="321" r="3.5"/><circle cx="9" cy="321" r="1.5" fill="#EDD98A"/>
    <circle cx="251" cy="321" r="3.5"/><circle cx="251" cy="321" r="1.5" fill="#EDD98A"/>
    <!-- Corner crosshairs -->
    <line x1="5" y1="9" x2="15" y2="9" stroke="#8B6914" stroke-width="1"/>
    <line x1="9" y1="5" x2="9" y2="15" stroke="#8B6914" stroke-width="1"/>
    <line x1="245" y1="9" x2="255" y2="9" stroke="#8B6914" stroke-width="1"/>
    <line x1="251" y1="5" x2="251" y2="15" stroke="#8B6914" stroke-width="1"/>
    <line x1="5" y1="321" x2="15" y2="321" stroke="#8B6914" stroke-width="1"/>
    <line x1="9" y1="315" x2="9" y2="325" stroke="#8B6914" stroke-width="1"/>
    <line x1="245" y1="321" x2="255" y2="321" stroke="#8B6914" stroke-width="1"/>
    <line x1="251" y1="315" x2="251" y2="325" stroke="#8B6914" stroke-width="1"/>
  </g>

  <!-- Latitude / longitude grid -->
  <g stroke="#B8963C" stroke-width="0.4" opacity="0.35">
    <line x1="50" y1="10" x2="50" y2="320"/>
    <line x1="90" y1="10" x2="90" y2="320"/>
    <line x1="130" y1="10" x2="130" y2="320"/>
    <line x1="170" y1="10" x2="170" y2="320"/>
    <line x1="210" y1="10" x2="210" y2="320"/>
    <line x1="10" y1="55" x2="250" y2="55"/>
    <line x1="10" y1="100" x2="250" y2="100"/>
    <line x1="10" y1="145" x2="250" y2="145"/>
    <line x1="10" y1="190" x2="250" y2="190"/>
    <line x1="10" y1="235" x2="250" y2="235"/>
    <line x1="10" y1="280" x2="250" y2="280"/>
  </g>

  <!-- Ocean wave texture -->
  <g stroke="#9B8040" stroke-width="0.7" fill="none" opacity="0.22">
    <path d="M 15,30 Q 22,27 29,30 Q 36,33 43,30"/>
    <path d="M 15,37 Q 22,34 29,37 Q 36,40 43,37"/>
    <path d="M 185,40 Q 192,37 199,40 Q 206,43 213,40 Q 220,37 227,40"/>
    <path d="M 185,47 Q 192,44 199,47 Q 206,50 213,47 Q 220,44 227,47"/>
    <path d="M 15,255 Q 22,252 29,255 Q 36,258 43,255"/>
    <path d="M 15,262 Q 22,259 29,262 Q 36,265 43,262"/>
    <path d="M 175,270 Q 182,267 189,270 Q 196,273 203,270 Q 210,267 217,270"/>
    <path d="M 175,277 Q 182,274 189,277 Q 196,280 203,277"/>
    <path d="M 50,300 Q 60,297 70,300 Q 80,303 90,300 Q 100,297 110,300 Q 120,303 130,300"/>
    <path d="M 55,308 Q 65,305 75,308 Q 85,311 95,308 Q 105,305 115,308"/>
  </g>

  <!-- Africa continent silhouette -->
  <path d="
    M 100,24
    C 118,21 138,21 158,23
    L 178,30
    L 194,46
    C 198,58 197,70 195,82
    L 190,100
    L 188,120
    L 185,148
    L 180,172
    L 172,196
    L 162,218
    L 148,234
    L 130,242
    L 112,236
    L 96,220
    L 83,200
    L 74,175
    L 67,150
    L 63,125
    C 61,110 61,96 63,83
    L 60,67
    L 53,52
    L 60,38
    L 80,28
    Z
  " fill="#C9A84C" stroke="#7A5800" stroke-width="1.8" opacity="0.88"/>

  <!-- Internal sketch lines (rivers / terrain suggestion) -->
  <g stroke="#8B6914" stroke-width="0.6" fill="none" opacity="0.2">
    <path d="M 130,24 L 128,55 L 120,75 L 115,100"/>
    <path d="M 158,23 L 155,55 L 158,85 L 162,110"/>
    <path d="M 63,100 L 90,95 L 125,98 L 158,95 L 188,100"/>
    <path d="M 67,145 L 92,140 L 125,143 L 158,140 L 184,145"/>
    <path d="M 78,185 L 105,180 L 130,183 L 158,180 L 178,185"/>
  </g>

  <!-- Nile river suggestion -->
  <path d="M 180,30 C 175,50 170,72 168,95 C 166,118 168,138 165,158"
    stroke="#7AADBA" stroke-width="1.2" fill="none" opacity="0.45" stroke-dasharray="2,1"/>

  <!-- Place name labels -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#4A2E00">
    <text x="130" y="42" text-anchor="middle" font-size="9" font-style="italic" opacity="0.7">AFRICA</text>
    <text x="175" y="44" text-anchor="middle" font-size="4.5" opacity="0.75">Cairo</text>
    <text x="82" y="112" text-anchor="middle" font-size="4" font-style="italic" opacity="0.65">Timbuktu</text>
    <text x="126" y="238" text-anchor="middle" font-size="3.8" font-style="italic" opacity="0.65">Cape of Good Hope</text>
  </g>

  <!-- Ocean labels -->
  <g font-family="Georgia, 'Times New Roman', serif" font-style="italic" fill="#5A7A50" opacity="0.38">
    <text x="32" y="170" text-anchor="middle" font-size="5" transform="rotate(-90,32,170)">ATLANTIC OCEAN</text>
    <text x="230" y="148" text-anchor="middle" font-size="5" transform="rotate(90,230,148)">INDIAN OCEAN</text>
    <text x="130" y="313" text-anchor="middle" font-size="4.5">SOUTHERN OCEAN</text>
  </g>

  <!-- Compass rose (bottom-right corner) -->
  <g transform="translate(216,287)">
    <circle cx="0" cy="0" r="24" fill="#EDD98A" stroke="#8B6914" stroke-width="1"/>
    <circle cx="0" cy="0" r="19" fill="none" stroke="#B8963C" stroke-width="0.6"/>
    <!-- Cardinal points -->
    <polygon points="0,-19 3.5,-8 0,-4 -3.5,-8" fill="#4A2E00"/>
    <polygon points="0,19 3.5,8 0,4 -3.5,8" fill="#8B6914" opacity="0.55"/>
    <polygon points="19,0 8,3.5 4,0 8,-3.5" fill="#8B6914" opacity="0.55"/>
    <polygon points="-19,0 -8,3.5 -4,0 -8,-3.5" fill="#8B6914" opacity="0.7"/>
    <!-- Intercardinal points -->
    <polygon points="0,-19 2.5,-10 0,-7 -2.5,-10" fill="#8B6914" opacity="0.35" transform="rotate(45)"/>
    <polygon points="0,-19 2.5,-10 0,-7 -2.5,-10" fill="#8B6914" opacity="0.35" transform="rotate(135)"/>
    <polygon points="0,-19 2.5,-10 0,-7 -2.5,-10" fill="#8B6914" opacity="0.35" transform="rotate(225)"/>
    <polygon points="0,-19 2.5,-10 0,-7 -2.5,-10" fill="#8B6914" opacity="0.35" transform="rotate(315)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="3.5" fill="#8B6914"/>
    <circle cx="0" cy="0" r="1.8" fill="#EDD98A"/>
    <!-- N label -->
    <text x="0" y="-22" text-anchor="middle" font-family="Georgia,serif" font-size="7" font-weight="bold" fill="#4A2E00">N</text>
  </g>

  <!-- Cartouche / title box -->
  <rect x="22" y="12" width="76" height="16" fill="#DEC870" stroke="#8B6914" stroke-width="0.8" rx="2" opacity="0.85"/>
  <text x="60" y="23" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="6" fill="#4A2E00" font-style="italic" opacity="0.9">Carta Africae</text>
</svg>
